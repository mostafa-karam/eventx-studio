name: EventX Studio CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        working-directory: backend
        run: npm ci
      - name: Run security audit
        working-directory: backend
        run: npm audit --audit-level=high
      - name: Run lint
        working-directory: backend
        run: npm run lint
      - name: Run tests
        working-directory: backend
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-jwt-secret
          JWT_REFRESH_SECRET: ci-test-refresh-secret
          MONGO_URI: mongodb://localhost:27017/eventx-ci
          FRONTEND_URL: http://localhost:3000
          CSRF_SECRET: ci-test-csrf-secret
          COOKIE_SIGNING_SECRET: ci-test-cookie-signing-secret-for-jest
          PAYMENT_HMAC_SECRET: ci-test-payment-hmac-secret
          QR_HMAC_SECRET: ci-test-qr-hmac-secret-for-jest
          SESSION_ENCRYPTION_KEY: ci-test-session-encryption-key-for-jest

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
          cache-dependency-path: frontend/eventx-frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend/eventx-frontend
        run: npm ci
      - name: Run lint
        working-directory: frontend/eventx-frontend
        run: npm run lint
