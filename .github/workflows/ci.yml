name: EventX Studio CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        working-directory: backend
        run: npm ci
      - name: Security Scan
        working-directory: backend
        run: npm audit --audit-level=high || true
      - name: Run lint
        working-directory: backend
        run: npm run lint || true
      - name: Run tests
        working-directory: backend
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-jwt-secret
          JWT_REFRESH_SECRET: ci-test-refresh-secret
          MONGODB_URI: mongodb://localhost:27017/eventx-ci
          CSRF_SECRET: ci-test-csrf-secret

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
          cache-dependency-path: frontend/eventx-frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend/eventx-frontend
        run: npm ci
      - name: Run lint
        working-directory: frontend/eventx-frontend
        run: npm run lint
